<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amino Acid Speciation Simulator</title>
<style>
:root {
  --bg: #f4f4f1;
  --surface: #ffffff;
  --border: #d0d0cc;
  --border2: #e8e8e4;
  --text: #1c1c1c;
  --muted: #666;
  --accent: #1a5faa;
  --panel: 300px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  overflow-x: hidden;
}

#app {
  display: grid;
  grid-template-columns: var(--panel) 1fr;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
}

#topbar {
  grid-column: 1 / -1;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 18px;
  display: flex;
  align-items: baseline;
  gap: 16px;
}

#topbar h1 { font-size: 15px; font-weight: 600; }
#topbar .sub { font-size: 12px; color: var(--muted); }
#topbar .spacer { flex: 1; }
#topbar a { font-size: 12px; color: var(--accent); text-decoration: none; }
#topbar a:hover { text-decoration: underline; }

#panel {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 14px 14px 20px;
  overflow-y: auto;
}

#workspace {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.section-hdr {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 12px 0 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border2);
}
.section-hdr:first-child { margin-top: 0; }

.ctrl { margin-bottom: 8px; }
.ctrl label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; }
.ctrl .lname { font-weight: 500; color: var(--text); font-size: 12px; }
.ctrl .lval { font-variant-numeric: tabular-nums; color: var(--accent); font-size: 12px; font-weight: 600; }
.ctrl .hint { font-size: 10.5px; color: var(--muted); margin-top: 2px; }
.ctrl input[type=range] {
  width: 100%;
  height: 4px;
  cursor: pointer;
  accent-color: var(--accent);
}
.ctrl select {
  width: 100%;
  padding: 4px 6px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--bg);
  font-size: 12px;
  color: var(--text);
}

#stats {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.stat {
  flex: 1;
  padding: 8px 12px;
  border-right: 1px solid var(--border2);
  min-width: 0;
}
.stat:last-child { border-right: none; }
.stat .sval {
  font-size: 17px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--accent);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.stat .slabel { font-size: 10px; color: var(--muted); text-transform: uppercase; }

.pka-list,
.species-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.pka-row,
.species-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 8px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 3px;
}
.pka-row span { color: var(--muted); }
.pka-row strong,
.species-row strong { color: var(--accent); font-variant-numeric: tabular-nums; }
.species-row span { display: flex; align-items: center; gap: 6px; color: var(--text); }
.species-row i { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

.chart-wrap {
  flex: 1;
  padding: 16px;
  min-height: 0;
}
#speciationChart {
  width: 100%;
  height: calc(100vh - 84px);
  min-height: 420px;
  background: var(--surface);
  border: 1px solid var(--border);
  display: block;
}

@media (max-width: 760px) {
  #app { grid-template-columns: 1fr; }
  #panel { border-right: none; border-bottom: 1px solid var(--border); }
  #stats { flex-direction: column; }
  #speciationChart { height: 460px; }
}
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
const moduleUrl = new URL("../src/pages/AminoAcidSimulator.jsx", window.location.href);
let code = await fetch(moduleUrl).then((response) => response.text());
code = code
  .replace('"../data/aminoacids.js"', `"${new URL("../src/data/aminoacids.js", window.location.href)}"`)
  .replace('"../utils/speciation.js"', `"${new URL("../src/utils/speciation.js", window.location.href)}"`);

const blobUrl = URL.createObjectURL(new Blob([code], { type: "text/javascript" }));
await import(blobUrl);
URL.revokeObjectURL(blobUrl);
</script>
</body>
</html>
