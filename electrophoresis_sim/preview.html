<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electroforesis Realista de Aminoácidos</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#ececec;
    color:#222;
}

.container{
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:360px;
    background:white;
    padding:18px;
    overflow-y:auto;
    box-shadow:2px 0 10px rgba(0,0,0,0.08);
}

.main{
    flex:1;
    padding:20px;
}

h1{
    margin-top:0;
    font-size:22px;
}

.control{
    margin-bottom:16px;
}

label{
    display:block;
    margin-bottom:4px;
    font-size:14px;
}

canvas{
    width:100%;
    max-width:1200px;
    background:#f5f0d8;
    border:1px solid #999;
}

.metrics{
    margin-top:20px;
    background:white;
    border:1px solid #ccc;
    padding:14px;
    max-width:1200px;
}

button{
    padding:10px 14px;
    border:none;
    background:#222;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#444;
}

select[multiple]{
    width:100%;
    height:300px;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:12px;
}

th,td{
    border:1px solid #ccc;
    padding:5px;
    text-align:center;
}

th{
    background:#efefef;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<h1>Electroforesis en Papel</h1>

<div class="control">
<label>Aminoácidos</label>
<select multiple id="aaSelect"></select>
</div>

<div class="control">
<button id="selectAll">Seleccionar todos</button>
</div>

<div class="control">
<label>pH: <span id="phVal"></span></label>
<input type="range" id="ph" min="0" max="14" step="0.1" value="6.0">
</div>

<div class="control">
<label>Buffer</label>
<select id="buffer">
<option value="">Ninguno</option>
<option value="4.7">Acetato pH 4.7</option>
<option value="7.0">Fosfato pH 7.0</option>
<option value="8.8">Tris pH 8.8</option>
</select>
</div>

<div class="control">
<label>Voltaje</label>
<select id="voltage">
<option>50</option>
<option selected>100</option>
<option>150</option>
<option>200</option>
</select>
</div>

<div class="control">
<label>Tiempo</label>
<select id="time">
<option>10</option>
<option>20</option>
<option selected>30</option>
<option>60</option>
<option>120</option>
</select>
</div>

<div class="control">
<button id="simulateBtn">Simular</button>
<button id="resetBtn">Reset</button>
</div>

<div class="control">
<button id="exportBtn">Exportar PNG</button>
</div>

</div>

<div class="main">

<canvas id="paper" width="1200" height="700"></canvas>

<div class="metrics">
<table>
<thead>
<tr>
<th>AA</th>
<th>MW</th>
<th>Carga neta</th>
<th>Dirección</th>
<th>Distancia (cm)</th>
</tr>
</thead>
<tbody id="resultsBody"></tbody>
</table>
</div>

</div>
</div>

<script>

const aminoAcids = [
{name:"Alanine",abbr:"Ala",mw:89.10,pka_cooh:2.35,pka_nh2:9.87,pka_side:null,side_type:null,color:"#1f77b4"},
{name:"Arginine",abbr:"Arg",mw:174.20,pka_cooh:1.82,pka_nh2:8.99,pka_side:12.48,side_type:"basic",color:"#d62728"},
{name:"Asparagine",abbr:"Asn",mw:132.12,pka_cooh:2.14,pka_nh2:8.72,pka_side:null,side_type:null,color:"#2ca02c"},
{name:"Aspartic Acid",abbr:"Asp",mw:133.11,pka_cooh:1.99,pka_nh2:9.90,pka_side:3.90,side_type:"acidic",color:"#9467bd"},
{name:"Cysteine",abbr:"Cys",mw:121.16,pka_cooh:1.92,pka_nh2:10.70,pka_side:8.37,side_type:"acidic",color:"#8c564b"},
{name:"Glutamic Acid",abbr:"Glu",mw:147.13,pka_cooh:2.10,pka_nh2:9.47,pka_side:4.07,side_type:"acidic",color:"#e377c2"},
{name:"Glutamine",abbr:"Gln",mw:146.15,pka_cooh:2.17,pka_nh2:9.13,pka_side:null,side_type:null,color:"#7f7f7f"},
{name:"Glycine",abbr:"Gly",mw:75.07,pka_cooh:2.35,pka_nh2:9.78,pka_side:null,side_type:null,color:"#bcbd22"},
{name:"Histidine",abbr:"His",mw:155.16,pka_cooh:1.80,pka_nh2:9.33,pka_side:6.04,side_type:"basic",color:"#17becf"},
{name:"Isoleucine",abbr:"Ile",mw:131.18,pka_cooh:2.32,pka_nh2:9.76,pka_side:null,side_type:null,color:"#ff7f0e"},
{name:"Leucine",abbr:"Leu",mw:131.18,pka_cooh:2.33,pka_nh2:9.74,pka_side:null,side_type:null,color:"#393b79"},
{name:"Lysine",abbr:"Lys",mw:146.19,pka_cooh:2.16,pka_nh2:9.06,pka_side:10.54,side_type:"basic",color:"#637939"},
{name:"Methionine",abbr:"Met",mw:149.21,pka_cooh:2.13,pka_nh2:9.28,pka_side:null,side_type:null,color:"#8c6d31"},
{name:"Phenylalanine",abbr:"Phe",mw:165.19,pka_cooh:2.20,pka_nh2:9.31,pka_side:null,side_type:null,color:"#843c39"},
{name:"Proline",abbr:"Pro",mw:115.13,pka_cooh:1.95,pka_nh2:10.64,pka_side:null,side_type:null,color:"#7b4173"},
{name:"Serine",abbr:"Ser",mw:105.09,pka_cooh:2.19,pka_nh2:9.21,pka_side:null,side_type:null,color:"#3182bd"},
{name:"Threonine",abbr:"Thr",mw:119.12,pka_cooh:2.09,pka_nh2:9.10,pka_side:null,side_type:null,color:"#31a354"},
{name:"Tryptophan",abbr:"Trp",mw:204.23,pka_cooh:2.46,pka_nh2:9.41,pka_side:null,side_type:null,color:"#756bb1"},
{name:"Tyrosine",abbr:"Tyr",mw:181.19,pka_cooh:2.20,pka_nh2:9.21,pka_side:10.46,side_type:"acidic",color:"#636363"},
{name:"Valine",abbr:"Val",mw:117.15,pka_cooh:2.29,pka_nh2:9.74,pka_side:null,side_type:null,color:"#e6550d"},
{name:"Ornithine",abbr:"Orn",mw:132.16,pka_cooh:2.17,pka_nh2:9.00,pka_side:10.80,side_type:"basic",color:"#006d2c"},
{name:"Citrulline",abbr:"Cit",mw:175.19,pka_cooh:2.12,pka_nh2:9.00,pka_side:null,side_type:null,color:"#9c9ede"},
{name:"Hydroxyproline",abbr:"Hyp",mw:131.13,pka_cooh:1.82,pka_nh2:9.66,pka_side:null,side_type:null,color:"#c49c94"}
];

const canvas = document.getElementById("paper");
const ctx = canvas.getContext("2d");

const aaSelect = document.getElementById("aaSelect");
const phSlider = document.getElementById("ph");
const phVal = document.getElementById("phVal");
const bufferSelect = document.getElementById("buffer");

const PAPER_LENGTH_CM = 10;
const PIXELS_PER_CM = 100;

aminoAcids.forEach((aa, idx)=>{

    const opt = document.createElement("option");
    opt.value = idx;
    opt.textContent = `${aa.abbr} — ${aa.name}`;

    aaSelect.appendChild(opt);
});

function acidicCharge(pKa,pH){
    return -1/(1+Math.pow(10,(pKa-pH)));
}

function basicCharge(pKa,pH){
    return 1/(1+Math.pow(10,(pH-pKa)));
}

function calculateNetCharge(aa,pH){

    let q = 0;

    q += acidicCharge(aa.pka_cooh,pH);
    q += basicCharge(aa.pka_nh2,pH);

    if(aa.pka_side){

        if(aa.side_type==="acidic"){
            q += acidicCharge(aa.pka_side,pH);
        }

        if(aa.side_type==="basic"){
            q += basicCharge(aa.pka_side,pH);
        }
    }

    return q;
}

function migrationDistance(q,mw,V,t){

    if(Math.abs(q)<0.0001){
        return 0;
    }

    const k = 8.5;

    let d = (k * q * (V/100) * (t/30)) / Math.sqrt(mw);

    if(d > PAPER_LENGTH_CM/2){
        d = PAPER_LENGTH_CM/2;
    }

    if(d < -PAPER_LENGTH_CM/2){
        d = -PAPER_LENGTH_CM/2;
    }

    return d;
}

function drawPaper(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#f5f0d8";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const centerX = canvas.width/2;

    ctx.strokeStyle = "#444";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(centerX,40);
    ctx.lineTo(centerX,650);
    ctx.stroke();

    for(let i=0;i<=10;i++){

        const x = 100+i*100;

        ctx.beginPath();
        ctx.moveTo(x,620);
        ctx.lineTo(x,635);
        ctx.stroke();

        ctx.fillStyle = "#333";
        ctx.font = "12px Arial";
        ctx.fillText(i+" cm",x-10,655);
    }

    ctx.fillStyle = "red";
    ctx.font = "24px Arial";
    ctx.fillText("+ Ánodo",20,40);

    ctx.fillStyle = "black";
    ctx.fillText("Cátodo −",canvas.width-160,40);

    ctx.fillStyle = "#222";
    ctx.font = "14px Arial";
    ctx.fillText("Línea de siembra",centerX-55,25);
}

function simulate(){

    drawPaper();

    const pH = parseFloat(phSlider.value);
    const V = parseFloat(document.getElementById("voltage").value);
    const t = parseFloat(document.getElementById("time").value);

    const selected = Array.from(aaSelect.selectedOptions)
        .map(o=> aminoAcids[o.value]);

    const resultsBody = document.getElementById("resultsBody");
    resultsBody.innerHTML = "";

    selected.forEach((aa,idx)=>{

        const q = calculateNetCharge(aa,pH);

        const d_cm = migrationDistance(q,aa.mw,V,t);

        const centerX = canvas.width/2;

        const x = centerX + d_cm*PIXELS_PER_CM;

        const y = 80 + idx*24;

        const grad = ctx.createRadialGradient(x,y,2,x,y,14);

        grad.addColorStop(0,aa.color);
        grad.addColorStop(1,"rgba(255,255,255,0.08)");

        ctx.beginPath();
        ctx.arc(x,y,11,0,Math.PI*2);

        ctx.fillStyle = grad;
        ctx.fill();

        ctx.strokeStyle = "#222";
        ctx.stroke();

        ctx.fillStyle = "#111";
        ctx.font = "12px Arial";
        ctx.fillText(aa.abbr,x-12,y+25);

        let direction = "Sin migración";

        if(q > 0.0001){
            direction = "Cátodo";
        }

        if(q < -0.0001){
            direction = "Ánodo";
        }

        const row = document.createElement("tr");

        row.innerHTML = `
        <td>${aa.abbr}</td>
        <td>${aa.mw.toFixed(2)}</td>
        <td>${q.toFixed(6)}</td>
        <td>${direction}</td>
        <td>${Math.abs(d_cm).toFixed(6)}</td>
        `;

        resultsBody.appendChild(row);
    });
}

phSlider.addEventListener("input",()=>{

    phVal.textContent = phSlider.value;

    bufferSelect.value = "";

    simulate();
});

bufferSelect.addEventListener("change",()=>{

    if(bufferSelect.value !== ""){

        phSlider.value = bufferSelect.value;
        phVal.textContent = bufferSelect.value;
    }

    simulate();
});

document.getElementById("simulateBtn")
.addEventListener("click",simulate);

document.getElementById("resetBtn")
.addEventListener("click",()=>{

    phSlider.value = 6.0;
    phVal.textContent = "6.0";

    bufferSelect.value = "";

    simulate();
});

document.getElementById("selectAll")
.addEventListener("click",()=>{

    Array.from(aaSelect.options)
    .forEach(o=> o.selected = true);

    simulate();
});

document.getElementById("exportBtn")
.addEventListener("click",()=>{

    const link = document.createElement("a");

    link.download = "electroforesis_realista.png";
    link.href = canvas.toDataURL();

    link.click();
});

Array.from(aaSelect.options)
.slice(0,6)
.forEach(o=> o.selected = true);

phVal.textContent = phSlider.value;

simulate();

</script>

</body>
</html>
